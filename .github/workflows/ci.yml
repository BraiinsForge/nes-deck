name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  host-tests:
    name: Host tests
    runs-on: ubuntu-24.04
    timeout-minutes: 20

    steps:
      - name: Check out source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Nix
        uses: cachix/install-nix-action@ab739621df7a23f52766f9ccc97f38da6b7af14f # v31.10.5
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Install host dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends -y imagemagick sbcl

      - name: Check shell scripts
        run: |
          nix shell nixpkgs#shellcheck -c shellcheck \
            -x \
            ops/lib/deck-config.sh \
            ops/check-deck.sh \
            ops/configure-deck.sh \
            ops/deploy.sh \
            ops/deploy/activate.sh \
            ops/provision-deck.sh \
            deploy/menu/nes-deck-swap.init \
            tests/deploy_config_test.sh \
            tests/deploy_activation_test.sh \
            tests/check_deck_test.sh \
            tests/nes_deck_swap_test.sh \
            tests/run-host-tests.sh \
            tests/verify-arm-builds.sh

      - name: Test Common Lisp policy
        run: |
          sbcl --script lisp/tests/run.lisp
          nix shell nixpkgs#ecl -c ecl --norc --shell lisp/tests/run.lisp

      - name: Run host regression suite
        run: tests/run-host-tests.sh

  arm-payloads:
    name: Static ARM payloads
    runs-on: ubuntu-24.04
    timeout-minutes: 90

    steps:
      - name: Check out source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Nix
        uses: cachix/install-nix-action@ab739621df7a23f52766f9ccc97f38da6b7af14f # v31.10.5
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Build and inspect complete payload
        run: tests/verify-arm-builds.sh
