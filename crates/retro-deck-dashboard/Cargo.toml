[package]
name = "retro-deck-dashboard"
description = "Dashboard model, renderer, and runtime for Retro Deck"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true

[features]
bmc-native = [
    "dep:anyhow",
    "dep:bmc-gpu-render-lock",
    "dep:bmc-log",
    "dep:bmc-render",
    "dep:bmc-wasm-protocol",
    "dep:bmc-widget",
    "dep:bmc-widget-protocol",
    "dep:glow",
    "dep:tracing",
]

[dependencies]
anyhow = { version = "1.0.98", optional = true }
bmc-gpu-render-lock = { git = "ssh://git@gitlab.ii.zone/bos/bmc-main.git", rev = "d4c964a06a34af30a99a467900ab14bc62f2cb62", optional = true }
bmc-log = { git = "ssh://git@gitlab.ii.zone/bos/bmc-main.git", rev = "d4c964a06a34af30a99a467900ab14bc62f2cb62", optional = true }
bmc-render = { git = "ssh://git@gitlab.ii.zone/bos/bmc-main.git", rev = "d4c964a06a34af30a99a467900ab14bc62f2cb62", optional = true }
bmc-wasm-protocol = { git = "ssh://git@gitlab.ii.zone/bos/bmc-main.git", rev = "d4c964a06a34af30a99a467900ab14bc62f2cb62", optional = true }
bmc-widget = { git = "ssh://git@gitlab.ii.zone/bos/bmc-main.git", rev = "d4c964a06a34af30a99a467900ab14bc62f2cb62", features = ["gpu"], optional = true }
bmc-widget-protocol = { git = "ssh://git@gitlab.ii.zone/bos/bmc-main.git", rev = "d4c964a06a34af30a99a467900ab14bc62f2cb62", optional = true }
glow = { version = "0.16.0", optional = true }
png = "0.18.1"
retro-deck-audio = { path = "../retro-deck-audio" }
retro-deck-config = { path = "../retro-deck-config" }
retro-deck-platform = { path = "../retro-deck-platform" }
retro-deck-ui = { path = "../retro-deck-ui" }
tracing = { version = "0.1.41", optional = true }

[lib]
path = "src/lib.rs"

[lints]
workspace = true
